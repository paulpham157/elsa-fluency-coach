<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluency Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #1a1a2e; background: #f8f9fc; width: 440px; max-height: 600px; overflow-y: auto; }
    .container { padding: 12px 16px 16px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; }
    .tab-btn { flex: 1; padding: 8px 0; border: none; background: none; font-size: 12px; font-weight: 600; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
    .tab-btn:hover { color: #64748b; }
    .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; width: 100%; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover { background: #047857; }

    .status { font-size: 12px; color: #64748b; margin-top: 8px; text-align: center; }
    .status.error { color: #dc2626; }
    .status.success { color: #059669; }

    .report { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 12px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 420px; overflow-y: auto; }
    .extract-info { font-size: 12px; color: #64748b; margin: 8px 0; text-align: center; }

    .config-label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
    .config-hint { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .config-textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; line-height: 1.5; resize: vertical; min-height: 200px; max-height: 400px; }

    .hidden { display: none; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="extract">Extract</button>
      <button class="tab-btn" data-tab="prompt">Prompt</button>
      <button class="tab-btn" data-tab="config">Config</button>
    </div>

    <!-- Tab 1: Extract -->
    <div id="tab-extract" class="tab-content active">
      <button id="extractBtn" class="btn btn-primary">Extract Data</button>
      <div id="status" class="status hidden"></div>
      <div id="extractInfo" class="extract-info hidden"></div>
      <div id="copySection" class="hidden mt-8">
        <button id="copyBtn" class="btn btn-success">Copy to Clipboard</button>
      </div>
    </div>

    <!-- Tab 2: Prompt -->
    <div id="tab-prompt" class="tab-content">
      <div id="promptTimestamp" class="extract-info hidden"></div>
      <div id="output" class="report"></div>
    </div>

    <!-- Tab 3: Config -->
    <div id="tab-config" class="tab-content">
      <label class="config-label" for="instructionsTextarea">Instructions for AI</label>
      <div class="config-hint">Edit how the AI should analyze the report. Changes apply when you copy.</div>
      <textarea id="instructionsTextarea" class="config-textarea" rows="12"></textarea>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
