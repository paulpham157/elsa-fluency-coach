<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluency Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #1a1a2e; background: #f8f9fc; width: 420px; max-height: 600px; overflow-y: auto; }
    .container { padding: 16px; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h2 { font-size: 13px; font-weight: 600; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
    .section { margin-bottom: 12px; background: #fff; border-radius: 8px; padding: 12px; border: 1px solid #e2e8f0; }
    .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
    .checkbox-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; }
    .checkbox-group input[type="checkbox"] { accent-color: #4f46e5; }
    .skill-checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-top: 6px; padding-left: 20px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; width: 100%; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }
    .btn-group .btn { width: auto; flex: 1; }
    .status { font-size: 12px; color: #64748b; margin-top: 8px; text-align: center; }
    .status.error { color: #dc2626; }
    .report { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; display: none; }
    .hidden { display: none; }
    .mt-8 { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      Fluency Coach
    </h1>

    <div id="settings" class="section">
      <h2>Settings</h2>
      <div class="checkbox-group">
        <label><input type="checkbox" id="includeTranscript" checked> Include transcript</label>
        <label><input type="checkbox" id="includeComparison" checked> Include score predictors</label>
        <label><input type="checkbox" id="includeSkillDetails" checked> Include skill details</label>
      </div>
      <div id="skillDetailOptions" class="skill-checkboxes">
        <label><input type="checkbox" value="pronunciation" checked> Pronunciation</label>
        <label><input type="checkbox" value="intonation" checked> Intonation</label>
        <label><input type="checkbox" value="fluency/pace" checked> Pace</label>
        <label><input type="checkbox" value="fluency/pausing" checked> Pausing</label>
        <label><input type="checkbox" value="fluency/hesitations" checked> Hesitations</label>
        <label><input type="checkbox" value="grammar" checked> Grammar</label>
        <label><input type="checkbox" value="vocabulary" checked> Vocabulary</label>
      </div>
    </div>

    <button id="extractBtn" class="btn btn-primary">Extract Data</button>

    <div id="status" class="status hidden"></div>

    <div id="output" class="report mt-8"></div>

    <div class="btn-group hidden" id="outputActions">
      <button id="copyBtn" class="btn btn-secondary">Copy to Clipboard</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
